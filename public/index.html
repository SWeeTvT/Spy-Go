<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spy Go 内鬼模式</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <p class="eyebrow">趣味围棋 · 内鬼模式</p>
        <h1>Spy Go</h1>
        <p class="subtitle">点开即用的 6 人内鬼模式身份与指认工具。</p>
      </div>
      <div class="status-pill" id="connectionStatus">连接中</div>
    </section>

    <section class="card" id="joinPanel">
      <h2 id="joinTitle">创建房间</h2>

      <div class="room-preview">
        <span>当前房间</span>
        <strong id="roomPreview">生成中...</strong>
      </div>

      <label>
        你的昵称
        <input id="nameInput" maxlength="16" placeholder="例如：小黑" autocomplete="nickname" />
      </label>

      <button id="joinButton">进入房间</button>

      <div class="invite-box hidden" id="inviteBox">
        <p>邀请链接</p>
        <div class="invite-row">
          <input id="inviteInput" readonly />
          <button id="copyInviteButton" type="button">复制</button>
        </div>
      </div>

      <p class="hint">
        分享邀请链接后，其他人点开网页只需要输入昵称即可加入同一房间。
      </p>
    </section>

    <section class="grid hidden" id="gamePanel">
      <section class="card">
        <div class="section-head">
          <h2>我的身份</h2>
          <span id="roomBadge" class="badge"></span>
        </div>

        <div id="playerInfo" class="player-info"></div>

        <div class="actions">
          <button id="copyRoomButton">复制邀请链接</button>
          <button id="startButton" class="hidden">开始游戏</button>
          <button id="resetButton" class="secondary hidden">重新开局</button>
        </div>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>玩家列表</h2>
          <span id="countBadge" class="badge">0 / 6</span>
        </div>

        <div id="playersList" class="players"></div>
      </section>

      <section class="card wide">
        <div class="section-head">
          <h2>当前阶段</h2>
          <span id="phaseBadge" class="badge"></span>
        </div>

        <div id="stageBox" class="stage-box"></div>
      </section>

      <section class="card wide">
        <h2>规则摘要</h2>

        <div class="rules">
          <div>
            <strong>身份配置</strong>
            <p>黑方 2 忠臣 + 1 内鬼；白方 2 忠臣 + 1 内鬼。</p>
          </div>
          <div>
            <strong>指认节点</strong>
            <p>第 50、100、150 手结束后可以指认。</p>
          </div>
          <div>
            <strong>忠臣</strong>
            <p>两名忠臣目标一致且正确，则成功抓出内鬼。</p>
          </div>
          <div>
            <strong>内鬼</strong>
            <p>隐藏身份，避免被抓，并尽量降低本方胜率。</p>
          </div>
        </div>
      </section>

      <section class="card wide">
        <h2>记录</h2>
        <div id="logBox" class="log-box"></div>
      </section>
    </section>
  </main>

  <template id="playerTemplate">
    <div class="player-row">
      <div>
        <strong class="player-name"></strong>
        <span class="host-mark"></span>
      </div>
      <span class="player-team"></span>
    </div>
  </template>

  <div class="toast hidden" id="toast"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="./app.js"></script>
</body>
</html>
